  <g stroke="url(#rsg)" stroke-width="1.1" opacity="0.5">
    <circle cx="24" cy="23" r="6.5"/>
    <circle cx="24" cy="23" r="11"/>
  </g>
  <!-- liens réseau surveillés -->
  <g stroke-width="1.4" opacity="0.95">
    <line x1="24" y1="23" x2="24" y2="11.5" stroke="#7c9cff"/>
    <line x1="24" y1="23" x2="33.5" y2="28.5" stroke="#2fe0d0"/>
    <line x1="24" y1="23" x2="15" y2="29.5" stroke="#fb5b6b"/>
  </g>
  <!-- noeuds (un rouge = menace détectée) -->
  <circle cx="24" cy="23" r="2.6" fill="#2fe0d0"/>
  <circle cx="24" cy="11.5" r="1.7" fill="#7c9cff"/>
  <circle cx="33.5" cy="28.5" r="1.7" fill="#2fe0d0"/>
  <circle cx="15" cy="29.5" r="1.9" fill="#fb5b6b"/>
  <!-- ligne de scan -->
  <path d="M8.5 19.5 H39.5" stroke="url(#rsg)" stroke-width="0.9" opacity="0.28"/>
