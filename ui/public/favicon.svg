<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="rsg" x1="4" y1="2" x2="44" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2fe0d0"/>
      <stop offset="1" stop-color="#7c9cff"/>
    </linearGradient>
  </defs>
  <!-- bouclier -->
  <path d="M24 2.5 L41.5 8.5 V22.5 C41.5 34 33.5 41.5 24 46 C14.5 41.5 6.5 34 6.5 22.5 V8.5 Z"
