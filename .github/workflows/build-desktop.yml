name: Build desktop (Tauri + sidecar)

# Compile l'installeur Windows de RED SHIELD sur un runner GitHub (sans Smart App Control,
# avec le toolchain MSVC) : impossible en local car SAC bloque les build-scripts non signés.
# Lancement manuel depuis l'onglet Actions.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    # Certificat de signature (facultatif) : déposez WINDOWS_CERTIFICATE (PFX en base64)
    # et WINDOWS_CERTIFICATE_PASSWORD dans les secrets du dépôt. Absents → build NON signé
    # (comportement actuel, inchangé). Présents → sidecar + installeur signés (voir docs/SIGNING.md).
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - name: Récupération du code
        uses: actions/checkout@v7

      - name: Python (pour le sidecar moteur)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dépendances moteur + PyInstaller
        working-directory: engine
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build du sidecar (moteur -> red-engine.exe)
        working-directory: engine
        run: |
          pyinstaller --onefile --name red-engine --collect-submodules app `
            --hidden-import app.main --collect-all uvicorn --collect-all keyring `
            --collect-submodules psutil `
            --distpath dist --workpath build_pyi --noconfirm run_engine.py
          New-Item -ItemType Directory -Force -Path ../ui/src-tauri/binaries | Out-Null
          Copy-Item dist/red-engine.exe ../ui/src-tauri/binaries/red-engine-x86_64-pc-windows-msvc.exe

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rust (MSVC, stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ui/src-tauri

      - name: Dépendances frontend
        working-directory: ui
        run: npm ci

      # Signature du code — S'EXÉCUTE UNIQUEMENT si un certificat est fourni en secret.
      # Sans secret, cette étape est sautée et le build reste identique à aujourd'hui.
      - name: Signature (sidecar + config installeur)
        if: ${{ env.WINDOWS_CERTIFICATE != '' }}
        working-directory: ui
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # 1. Décoder le PFX (base64) fourni en secret, l'importer, récupérer l'empreinte.
          $pfx = Join-Path $env:RUNNER_TEMP "rs-cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $pw = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pw
          $thumb = $cert.Thumbprint
          # 2. Localiser signtool (Windows SDK) et signer le sidecar : Tauri ne signe PAS les externalBin.
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                      Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          & $signtool sign /sha1 $thumb /fd sha256 /tr http://timestamp.digicert.com /td sha256 `
            "src-tauri/binaries/red-engine-x86_64-pc-windows-msvc.exe"
          if ($LASTEXITCODE -ne 0) { throw "signtool a échoué sur le sidecar" }
          # 3. Injecter l'empreinte dans la config Tauri → l'installeur NSIS sera signé au build.
          $conf = "src-tauri/tauri.conf.json"
          $json = Get-Content $conf -Raw | ConvertFrom-Json
          $win = @{ certificateThumbprint = $thumb; digestAlgorithm = "sha256"; timestampUrl = "http://timestamp.digicert.com" }
          if ($json.bundle.PSObject.Properties.Name -contains 'windows') { $json.bundle.windows = $win }
          else { $json.bundle | Add-Member -NotePropertyName windows -NotePropertyValue $win }
          $json | ConvertTo-Json -Depth 30 | Set-Content $conf -Encoding utf8
          Write-Host "Signature configurée (empreinte $thumb) : sidecar signé, installeur sera signé par Tauri."

      - name: Build Tauri (installeur NSIS)
        working-directory: ui
        run: npx tauri build

      - name: Publication de l'installeur
        uses: actions/upload-artifact@v4
        with:
          name: RED-SHIELD-setup-windows
          path: ui/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
